<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Budget Cloud V5.13</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

    <style>
        :root { --app-primary: #6366f1; --app-bg: #f8fafc; }
        body { background-color: var(--app-bg); -webkit-tap-highlight-color: transparent; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        #splashScreen { transition: opacity 0.5s ease-out; }
        .category-pill.selected { background-color: var(--app-primary) !important; color: white !important; border-color: var(--app-primary) !important; }
        .action-card { transition: transform 0.1s active; cursor: pointer; }
        .action-card:active { transform: scale(0.98); }
    </style>
</head>
<body class="min-h-screen font-sans text-slate-800">

    <!-- SPLASH SCREEN -->
    <div id="splashScreen" class="fixed inset-0 bg-white z-[1000] flex flex-col items-center justify-center p-8 text-center">
        <div class="w-20 h-20 bg-indigo-600 text-white rounded-3xl flex items-center justify-center text-4xl mb-4 shadow-2xl">
            <i class="fas fa-wallet"></i>
        </div>
        <p id="statusText" class="text-slate-400 font-bold text-xs uppercase tracking-widest">Lade System...</p>
    </div>

    <!-- MAIN APP UI -->
    <div id="mainApp" class="flex flex-col min-h-screen">
        <header class="p-6 bg-white border-b border-slate-100 flex justify-between items-center sticky top-0 z-30">
            <div>
                <h2 class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1 flex items-center gap-2">
                    Gesamtsaldo <span id="cloudStatus" class="w-2 h-2 rounded-full bg-slate-300"></span>
                </h2>
                <div id="totalAmount" class="text-3xl font-black text-slate-900 tracking-tight">0,00 €</div>
            </div>
            <button onclick="document.getElementById('dataModal').classList.remove('hidden')" class="w-12 h-12 bg-slate-50 text-slate-500 rounded-2xl flex items-center justify-center border border-slate-100 shadow-sm">
                <i class="fas fa-cog"></i>
            </button>
        </header>

        <div class="bg-white/95 backdrop-blur-md border-b border-slate-100 sticky top-[93px] z-20">
            <div class="px-6 py-4">
                <div class="relative">
                    <input type="text" id="searchInput" placeholder="Suchen..." class="w-full p-4 pl-12 bg-slate-100/50 border border-transparent rounded-2xl text-sm outline-none focus:bg-white focus:border-indigo-100 transition-all">
                    <i class="fas fa-search absolute left-5 top-1/2 -translate-y-1/2 text-slate-400"></i>
                </div>
            </div>
            <div id="filterBar" class="px-6 pb-4 flex gap-2 overflow-x-auto no-scrollbar"></div>
        </div>

        <div class="flex-1 p-6 space-y-4 pb-36 overflow-y-auto" id="expenseList"></div>

        <div class="fixed bottom-0 left-0 right-0 p-8 flex justify-center pointer-events-none z-40">
            <button id="addExpenseBtn" class="w-full max-w-md bg-indigo-600 text-white font-bold py-5 rounded-2xl flex items-center justify-center gap-3 pointer-events-auto text-lg shadow-xl hover:bg-indigo-700 transition-colors">
                <i class="fas fa-plus"></i> Neuer Eintrag
            </button>
        </div>
    </div>

    <!-- SETTINGS MODAL -->
    <div id="dataModal" class="hidden fixed inset-0 bg-slate-900/60 z-[700] flex items-center justify-center p-6">
        <div class="bg-white w-full max-w-md rounded-[2.5rem] p-8 shadow-2xl flex flex-col max-h-[90vh]">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-xl font-black text-slate-900">Einstellungen</h3>
                <button onclick="closeModal('dataModal')" class="text-slate-400"><i class="fas fa-times"></i></button>
            </div>
            
            <div class="flex-1 overflow-y-auto no-scrollbar space-y-6">
                <div class="space-y-4">
                    <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest block">Daten-Management</label>
                    <div class="grid grid-cols-1 gap-3">
                        <label class="bg-indigo-50 text-indigo-600 font-bold py-4 rounded-2xl text-sm flex items-center justify-center gap-3 cursor-pointer border border-indigo-100 hover:bg-indigo-100 transition-colors">
                            <i class="fas fa-file-import text-lg"></i> CSV Import (Smart)
                            <input type="file" accept=".csv" class="hidden" onchange="handleImport(this)">
                        </label>
                        <button onclick="handleManualExport()" class="bg-slate-900 text-white font-bold py-4 rounded-2xl text-sm flex items-center justify-center gap-3 shadow-lg hover:bg-slate-800 transition-all">
                            <i class="fas fa-file-export text-lg"></i> Als CSV Exportieren
                        </button>
                    </div>
                </div>

                <div class="pt-4 border-t border-slate-100">
                    <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest block mb-2">Kategorien Verwalten</label>
                    <div id="manageCategoryList" class="space-y-2 mb-4"></div>
                    <div class="flex gap-2">
                        <input type="text" id="newCatInput" placeholder="Neue Kategorie..." class="flex-1 p-3 bg-slate-50 border border-slate-200 rounded-xl text-sm outline-none focus:border-indigo-300">
                        <button onclick="addNewCategory()" class="bg-indigo-600 text-white px-5 rounded-xl"><i class="fas fa-plus"></i></button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- ADD/EDIT MODAL -->
    <div id="addModal" class="hidden fixed inset-0 bg-slate-900/60 z-[600] flex items-end sm:items-center justify-center">
        <div class="bg-white w-full max-w-lg rounded-t-[2.5rem] sm:rounded-[2.5rem] p-8 shadow-2xl overflow-y-auto max-h-[95vh]">
             <div class="flex justify-between items-center mb-6">
                <h3 id="modalTitle" class="text-xl font-black text-slate-900">Eintrag</h3>
                <button onclick="closeModal('addModal')" class="w-10 h-10 bg-slate-50 text-slate-400 rounded-full flex items-center justify-center"><i class="fas fa-times"></i></button>
            </div>
            <form id="expenseForm" class="space-y-4">
                <input type="hidden" id="editId">
                <div class="grid grid-cols-2 gap-4">
                    <input type="number" id="betrag" placeholder="0,00" step="0.01" required class="w-full p-4 bg-slate-50 rounded-2xl text-xl font-bold outline-none border-2 border-transparent focus:border-indigo-500">
                    <input type="date" id="datum" required class="w-full p-4 bg-slate-50 rounded-2xl font-bold outline-none border-2 border-transparent focus:border-indigo-500">
                </div>
                <input type="text" id="beschreibung" placeholder="Wofür?" required class="w-full p-4 bg-slate-50 rounded-2xl font-bold outline-none border-2 border-transparent focus:border-indigo-500">
                <div class="relative">
                    <input type="text" id="beleg" placeholder="Beleg (URL oder Notiz) - Optional" class="w-full p-4 bg-slate-50 rounded-2xl font-bold outline-none border-2 border-transparent focus:border-indigo-500 text-sm">
                    <div id="belegPreview" class="absolute right-4 top-1/2 -translate-y-1/2 hidden">
                        <a href="#" id="belegLink" target="_blank" class="text-indigo-600"><i class="fas fa-external-link-alt"></i></a>
                    </div>
                </div>
                <div id="categoryGrid" class="flex flex-wrap gap-2"></div>
                
                <div class="flex gap-4 pt-4">
                    <button type="submit" class="flex-1 bg-indigo-600 text-white font-bold py-5 rounded-2xl shadow-lg">Speichern</button>
                    <button type="button" id="deleteBtn" class="hidden bg-rose-50 text-rose-500 font-bold px-6 rounded-2xl"><i class="fas fa-trash-alt"></i></button>
                </div>
            </form>
        </div>
    </div>

    <script>
        var expenses = [];
        var categories = [];
        var activeFilter = 'all';
        var selectedCategory = '';
        var db = null;
        var currentUser = null;
        var appId = "budget-v5-local-fs";

        window.onload = function() { 
            tryInitialize(); 
        };

        // --- DUPLIKAT-PRÜFUNG ---
        function isDuplicate(newData) {
            return expenses.some(e => 
                e.datum === newData.datum && 
                e.beschreibung.toLowerCase() === newData.beschreibung.toLowerCase() && 
                Math.abs(e.betrag - newData.betrag) < 0.001
            );
        }

        // --- IMPORT LOGIK ---
        async function handleImport(input) {
            const file = input.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = async (e) => {
                const text = e.target.result;
                const lines = text.split('\n').filter(line => line.trim() !== '');
                if (lines.length < 2) return;
                
                const importedData = [];
                let duplicateCount = 0;

                for (let i = 1; i < lines.length; i++) {
                    const values = lines[i].split(/[;,]/);
                    if (values.length < 3) continue;
                    
                    const datum = values[0]?.replace(/"/g, '').trim() || new Date().toISOString().split('T')[0];
                    const beschreibung = values[1]?.replace(/"/g, '').trim() || 'Import';
                    const betrag = parseFloat(values[2]?.replace(/"/g, '').replace(',', '.')) || 0;
                    const beleg = values[4]?.replace(/"/g, '').trim() || '';

                    const entry = {
                        datum, beschreibung, betrag, beleg,
                        kategorieId: categories[0]?.id,
                        ts: Date.now() + i
                    };

                    // Prüfe auf Duplikat
                    if (isDuplicate(entry)) {
                        duplicateCount++;
                        continue;
                    }

                    importedData.push(entry);
                }

                if (importedData.length > 0) {
                    if (db && currentUser) {
                        const batch = db.batch();
                        const col = db.collection('artifacts').doc(appId).collection('users').doc(currentUser.uid).collection('ausgaben');
                        importedData.forEach(d => batch.set(col.doc(), d));
                        await batch.commit();
                    } else {
                        importedData.forEach(d => expenses.push({...d, id: 'imp_'+Date.now()+Math.random()}));
                        saveOffline(); renderUI();
                    }
                }
                
                let msg = `${importedData.length} Einträge importiert.`;
                if (duplicateCount > 0) msg += ` (${duplicateCount} Duplikate ignoriert)`;
                showBanner(msg);
                input.value = "";
            };
            reader.readAsText(file);
        }

        // --- EXPORT LOGIK ---
        async function handleManualExport() {
            const csvData = generateCSV();
            const fileName = `budget_export_${new Date().toISOString().split('T')[0]}.csv`;
            try {
                const blob = new Blob(["\uFEFF" + csvData], { type: 'text/csv;charset=utf-8;' });
                const url = window.URL.createObjectURL(blob);
                const link = document.createElement("a");
                link.href = url;
                link.setAttribute("download", fileName);
                document.body.appendChild(link);
                link.click();
                setTimeout(() => {
                    document.body.removeChild(link);
                    window.URL.revokeObjectURL(url);
                }, 100);
                showBanner("Export abgeschlossen!");
            } catch (err) {
                alert("Fehler beim Export: " + err.message);
            }
        }

        function generateCSV() {
            const headers = ["Datum", "Beschreibung", "Betrag", "Kategorie", "Beleg"];
            const rows = expenses.map(e => {
                const cat = categories.find(c => c.id === e.kategorieId)?.name || "Divers";
                const desc = (e.beschreibung || "").replace(/;/g, ',');
                const bel = (e.beleg || "").replace(/;/g, ',');
                return `${e.datum};${desc};${e.betrag};${cat};${bel}`;
            });
            return headers.join(";") + "\n" + rows.join("\n");
        }

        // --- CORE FUNKTIONEN ---
        function tryInitialize() {
            var configStr = window["__firebase_config"];
            if (!configStr) { startOfflineMode(); return; }
            try {
                var config = JSON.parse(configStr);
                firebase.initializeApp(config);
                db = firebase.firestore();
                firebase.auth().onAuthStateChanged(user => {
                    if (user) { 
                        currentUser = user; 
                        document.getElementById('cloudStatus').classList.replace('bg-slate-300', 'bg-emerald-500');
                        startSync(); 
                    } else { firebase.auth().signInAnonymously(); }
                });
            } catch(e) { startOfflineMode(); }
        }

        function startOfflineMode() {
            var savedExp = localStorage.getItem(appId + '_expenses');
            var savedCat = localStorage.getItem(appId + '_categories');
            expenses = savedExp ? JSON.parse(savedExp) : [];
            categories = savedCat ? JSON.parse(savedCat) : [{id:'c1',name:'Essen'},{id:'c2',name:'Gehalt'}];
            renderUI(); hideSplash();
        }

        function startSync() {
            const userRef = db.collection('artifacts').doc(appId).collection('users').doc(currentUser.uid);
            userRef.collection('categories').onSnapshot(snap => {
                categories = snap.docs.map(d => ({...d.data(), id: d.id}));
                if (categories.length === 0) setupDefaultsCloud();
                renderUI(); hideSplash();
            });
            userRef.collection('ausgaben').onSnapshot(snap => {
                expenses = snap.docs.map(d => ({...d.data(), id: d.id}));
                expenses.sort((a,b) => new Date(b.datum) - new Date(a.datum));
                renderUI();
            });
        }

        function renderUI() {
            const list = document.getElementById('expenseList');
            const search = document.getElementById('searchInput').value.toLowerCase();
            const filtered = expenses.filter(e => {
                const cat = categories.find(c => c.id === e.kategorieId);
                const mS = (e.beschreibung || "").toLowerCase().includes(search) || (cat?.name.toLowerCase().includes(search));
                const mF = activeFilter === 'all' || e.kategorieId === activeFilter;
                return mS && mF;
            });

            let total = 0;
            let html = "";
            filtered.forEach(e => {
                const cat = categories.find(c => c.id === e.kategorieId);
                const isInc = cat?.name === 'Gehalt';
                total += isInc ? (parseFloat(e.betrag) || 0) : -(parseFloat(e.betrag) || 0);
                
                let belegIcon = "";
                if (e.beleg) {
                    if (e.beleg.startsWith('http')) {
                        belegIcon = `<a href="${e.beleg}" target="_blank" onclick="event.stopPropagation()" class="ml-2 w-8 h-8 bg-indigo-50 text-indigo-500 rounded-lg flex items-center justify-center text-[10px]"><i class="fas fa-link"></i></a>`;
                    } else {
                        belegIcon = `<span class="ml-2 text-slate-300 text-[10px]"><i class="fas fa-paperclip"></i></span>`;
                    }
                }

                html += `
                <div class="bg-white p-5 rounded-[2rem] border border-slate-50 shadow-sm flex items-center justify-between action-card" onclick="editExpense('${e.id}')">
                    <div class="flex items-center gap-4 flex-1 min-w-0">
                        <div class="w-12 h-12 rounded-2xl ${isInc ? 'bg-emerald-50 text-emerald-500' : 'bg-indigo-50 text-indigo-500'} flex items-center justify-center shrink-0"><i class="fas ${isInc ? 'fa-arrow-up' : 'fa-arrow-down'}"></i></div>
                        <div class="min-w-0 pr-2">
                            <p class="font-bold text-slate-900 truncate flex items-center uppercase text-[13px] tracking-tight">
                                ${e.beschreibung}
                            </p>
                            <p class="text-[10px] text-slate-400 font-bold uppercase">${new Date(e.datum).toLocaleDateString('de-DE')} • ${cat?.name || 'Diverse'}</p>
                        </div>
                    </div>
                    <div class="flex items-center">
                        <p class="font-black ${isInc ? 'text-emerald-500' : 'text-slate-900'} whitespace-nowrap text-right">${isInc ? '+' : '-'}${parseFloat(e.betrag).toFixed(2)} €</p>
                        ${belegIcon}
                    </div>
                </div>`;
            });
            list.innerHTML = html || '<div class="text-center py-20 text-slate-300">Keine Einträge</div>';
            document.getElementById('totalAmount').innerText = total.toLocaleString('de-DE', {style:'currency', currency:'EUR'});
            renderFilters();
            renderManagementUI();
        }

        // --- FILTER & CATEGORIES ---
        function renderFilters() {
            var html = `<button onclick="setFilter('all')" class="px-5 py-2.5 rounded-xl text-[10px] font-bold uppercase ${activeFilter==='all'?'bg-indigo-600 text-white':'bg-white text-slate-400 border'}">Alle</button>`;
            categories.forEach(c => {
                html += `<button onclick="setFilter('${c.id}')" class="px-5 py-2.5 rounded-xl text-[10px] font-bold uppercase whitespace-nowrap ${activeFilter===c.id?'bg-indigo-600 text-white':'bg-white text-slate-400 border'}">${c.name}</button>`;
            });
            document.getElementById('filterBar').innerHTML = html;
        }

        function renderManagementUI() {
            document.getElementById('manageCategoryList').innerHTML = categories.map(c => `
                <div class="flex items-center gap-2 bg-slate-50 p-2 pl-4 rounded-xl border text-sm font-bold">
                    <input type="text" value="${c.name}" onblur="updateCatName('${c.id}', this.value)" class="flex-1 bg-transparent outline-none">
                    <button onclick="requestDeleteCategory('${c.id}')" class="w-8 h-8 text-rose-400"><i class="fas fa-times"></i></button>
                </div>`).join('');
        }

        window.setFilter = id => { activeFilter = id; renderUI(); };
        window.closeModal = id => document.getElementById(id).classList.add('hidden');
        document.getElementById('searchInput').oninput = renderUI;

        // --- EXPENSE FORM LOGIK ---
        document.getElementById('addExpenseBtn').onclick = () => {
            document.getElementById('expenseForm').reset();
            document.getElementById('editId').value = '';
            document.getElementById('datum').value = new Date().toISOString().split('T')[0];
            document.getElementById('belegPreview').classList.add('hidden');
            selectedCategory = categories[0]?.id;
            document.getElementById('deleteBtn').classList.add('hidden');
            document.getElementById('addModal').classList.remove('hidden');
            renderCategoryGrid();
        };

        window.editExpense = id => {
            const e = expenses.find(x => x.id === id); if (!e) return;
            document.getElementById('editId').value = e.id;
            document.getElementById('betrag').value = e.betrag;
            document.getElementById('beschreibung').value = e.beschreibung;
            document.getElementById('datum').value = e.datum;
            const belegVal = e.beleg || '';
            document.getElementById('beleg').value = belegVal;
            
            const preview = document.getElementById('belegPreview');
            const link = document.getElementById('belegLink');
            if (belegVal.startsWith('http')) {
                preview.classList.remove('hidden');
                link.href = belegVal;
            } else {
                preview.classList.add('hidden');
            }

            selectedCategory = e.kategorieId;
            document.getElementById('deleteBtn').classList.remove('hidden');
            document.getElementById('addModal').classList.remove('hidden');
            renderCategoryGrid();
        };

        document.getElementById('beleg').oninput = (e) => {
            const val = e.target.value.trim();
            const preview = document.getElementById('belegPreview');
            const link = document.getElementById('belegLink');
            if (val.startsWith('http')) {
                preview.classList.remove('hidden');
                link.href = val;
            } else {
                preview.classList.add('hidden');
            }
        };

        document.getElementById('expenseForm').onsubmit = ev => {
            ev.preventDefault();
            const id = document.getElementById('editId').value;
            const data = {
                betrag: parseFloat(document.getElementById('betrag').value),
                beschreibung: document.getElementById('beschreibung').value.trim(),
                datum: document.getElementById('datum').value,
                beleg: document.getElementById('beleg').value.trim(),
                kategorieId: selectedCategory,
                ts: Date.now()
            };
            if (db && currentUser) {
                const col = db.collection('artifacts').doc(appId).collection('users').doc(currentUser.uid).collection('ausgaben');
                (id ? col.doc(id).update(data) : col.add(data)).then(() => closeModal('addModal'));
            } else {
                if (id) { const idx = expenses.findIndex(x => x.id === id); expenses[idx] = {...data, id}; }
                else { expenses.push({...data, id: 'off_'+Date.now()}); }
                saveOffline(); closeModal('addModal'); renderUI();
            }
        };

        function renderCategoryGrid() {
            document.getElementById('categoryGrid').innerHTML = categories.map(c => `
                <button type="button" onclick="selectedCategory='${c.id}';renderCategoryGrid()" class="category-pill px-4 py-3 rounded-xl border-2 text-[10px] font-bold uppercase ${selectedCategory===c.id?'selected':'bg-slate-50 text-slate-500'}">${c.name}</button>
            `).join('');
        }

        window.addNewCategory = () => {
            const n = document.getElementById('newCatInput').value.trim(); if (!n) return;
            if (db && currentUser) db.collection('artifacts').doc(appId).collection('users').doc(currentUser.uid).collection('categories').add({name:n});
            else { categories.push({id:'c'+Date.now(), name:n}); saveOffline(); renderUI(); }
            document.getElementById('newCatInput').value = "";
        };

        window.updateCatName = (id, val) => {
            if (!val.trim()) return;
            if (db && currentUser) db.collection('artifacts').doc(appId).collection('users').doc(currentUser.uid).collection('categories').doc(id).update({name:val.trim()});
            else { categories.forEach(c => {if(c.id===id) c.name=val.trim()}); saveOffline(); renderUI(); }
        };

        window.requestDeleteCategory = id => {
            if (categories.length <= 1) return;
            if (db && currentUser) db.collection('artifacts').doc(appId).collection('users').doc(currentUser.uid).collection('categories').doc(id).delete();
            else { categories = categories.filter(c => c.id !== id); saveOffline(); renderUI(); }
        };

        document.getElementById('deleteBtn').onclick = () => {
            const id = document.getElementById('editId').value;
            if (db && currentUser) db.collection('artifacts').doc(appId).collection('users').doc(currentUser.uid).collection('ausgaben').doc(id).delete().then(() => closeModal('addModal'));
            else { expenses = expenses.filter(x => x.id !== id); saveOffline(); closeModal('addModal'); renderUI(); }
        };

        function saveOffline() {
            localStorage.setItem(appId + '_expenses', JSON.stringify(expenses));
            localStorage.setItem(appId + '_categories', JSON.stringify(categories));
        }

        function setupDefaultsCloud() {
            ['Essen','Wohnen','Gehalt','Freizeit'].forEach(n => { 
                db.collection('artifacts').doc(appId).collection('users').doc(currentUser.uid).collection('categories').add({name: n}); 
            });
        }

        function showBanner(msg) {
            const b = document.createElement('div');
            b.className = "fixed top-24 left-1/2 -translate-x-1/2 bg-slate-900 text-white px-6 py-3 rounded-full text-xs font-bold z-[1000] shadow-2xl animate-bounce";
            b.innerText = msg;
            document.body.appendChild(b);
            setTimeout(() => b.remove(), 4000);
        }

        function hideSplash() {
            document.getElementById('splashScreen').style.opacity = '0';
            setTimeout(() => document.getElementById('splashScreen').style.display = 'none', 500);
        }
    </script>
</body>
</html>
