<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Budget Cloud V5.13</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#6366f1">
    
    <link rel="manifest" href="manifest.json">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

    <style>
        :root { --app-primary: #6366f1; --app-bg: #f8fafc; }
        body { 
            background-color: var(--app-bg); 
            -webkit-tap-highlight-color: transparent;
            padding-top: env(safe-area-inset-top);
        }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        #splashScreen { transition: opacity 0.5s ease-out; }
    </style>
</head>
<body class="min-h-screen font-sans text-slate-800">

    <div id="splashScreen" class="fixed inset-0 bg-white z-[1000] flex flex-col items-center justify-center p-8 text-center">
        <div class="w-20 h-20 bg-indigo-600 text-white rounded-3xl flex items-center justify-center text-4xl mb-4 shadow-2xl">
            <i class="fas fa-wallet"></i>
        </div>
        <p id="statusText" class="text-slate-400 font-bold text-xs uppercase tracking-widest">Initialisiere Cloud...</p>
    </div>

    <div id="mainApp" class="flex flex-col min-h-screen">
        <header class="p-6 bg-white border-b border-slate-100 flex justify-between items-center sticky top-0 z-30">
            <div>
                <h2 class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1 flex items-center gap-2">
                    Gesamtsaldo <span id="cloudStatus" class="w-2 h-2 rounded-full bg-slate-300"></span>
                </h2>
                <div id="totalAmount" class="text-3xl font-black text-slate-900 tracking-tight">0,00 €</div>
            </div>
            <button onclick="document.getElementById('dataModal').classList.remove('hidden')" class="w-12 h-12 bg-slate-50 text-slate-500 rounded-2xl flex items-center justify-center border border-slate-100 shadow-sm">
                <i class="fas fa-cog"></i>
            </button>
        </header>

        <div class="flex-1 p-6 space-y-4 pb-40 overflow-y-auto" id="expenseList"></div>

        <div class="fixed bottom-0 left-0 right-0 p-8 flex justify-center pointer-events-none z-40 mb-[env(safe-area-inset-bottom)]">
            <button id="addExpenseBtn" class="w-full max-w-md bg-indigo-600 text-white font-bold py-5 rounded-2xl flex items-center justify-center gap-3 pointer-events-auto text-lg shadow-xl active:scale-95 transition-all">
                <i class="fas fa-plus"></i> Neuer Eintrag
            </button>
        </div>
    </div>

    <!-- MODAL ZUM HINZUFÜGEN -->
    <div id="addModal" class="hidden fixed inset-0 bg-slate-900/60 z-[600] flex items-end sm:items-center justify-center p-4">
        <div class="bg-white w-full max-w-lg rounded-[2.5rem] p-8 shadow-2xl">
            <h3 class="text-xl font-black mb-6">Neuer Eintrag</h3>
            <form id="expenseForm" class="space-y-4">
                <input type="number" id="betrag" placeholder="0,00" step="0.01" required class="w-full p-4 bg-slate-50 rounded-2xl text-xl font-bold outline-none border-2 border-transparent focus:border-indigo-500">
                <input type="text" id="beschreibung" placeholder="Wofür?" required class="w-full p-4 bg-slate-50 rounded-2xl font-bold outline-none border-2 border-transparent focus:border-indigo-500">
                <input type="date" id="datum" required class="w-full p-4 bg-slate-50 rounded-2xl font-bold outline-none border-2 border-transparent focus:border-indigo-500">
                <button type="submit" class="w-full bg-indigo-600 text-white font-bold py-5 rounded-2xl shadow-lg">Speichern</button>
                <button type="button" onclick="closeModal('addModal')" class="w-full text-slate-400 py-2">Abbrechen</button>
            </form>
        </div>
    </div>

    <script>
        var expenses = [];
        var db = null;
        var currentUser = null;
        
        // --- HIER DEINE FIREBASE DATEN EINFÜGEN ---
        const firebaseConfig = {
  apiKey: "AIzaSyD1zzt4pZzyNxMDWpc5MG2aPRecHKQG7IE",
  authDomain: "meinbudgetcloud.firebaseapp.com",
  projectId: "meinbudgetcloud",
  storageBucket: "meinbudgetcloud.firebasestorage.app",
  messagingSenderId: "594713378906",
  appId: "1:594713378906:web:7929f7a875159336101863"
};

        window.onload = function() {
            try {
                firebase.initializeApp(firebaseConfig);
                db = firebase.firestore();
                firebase.auth().onAuthStateChanged(user => {
                    if (user) { 
                        currentUser = user; 
                        document.getElementById('cloudStatus').classList.replace('bg-slate-300', 'bg-emerald-500');
                        startSync(); 
                    } else { 
                        firebase.auth().signInAnonymously(); 
                    }
                });
            } catch(e) {
                console.error("Firebase Fehler:", e);
                alert("Cloud-Verbindung konnte nicht hergestellt werden.");
            }
        };

        function startSync() {
            // Pfad-Struktur laut Sicherheits-Regel
            const col = db.collection('artifacts').doc('budget-app').collection('users').doc(currentUser.uid).collection('ausgaben');
            
            col.onSnapshot(snap => {
                expenses = snap.docs.map(d => ({...d.data(), id: d.id}));
                renderUI();
                hideSplash();
            }, err => {
                console.error("Firestore Fehler:", err);
                alert("Keine Berechtigung zum Lesen/Schreiben. Bitte Firebase Rules prüfen.");
            });
        }

        function renderUI() {
            const list = document.getElementById('expenseList');
            let total = 0;
            let html = "";
            expenses.forEach(e => {
                total += parseFloat(e.betrag);
                html += `
                <div class="bg-white p-5 rounded-2xl border border-slate-100 flex justify-between items-center">
                    <div>
                        <p class="font-bold text-slate-900">${e.beschreibung}</p>
                        <p class="text-xs text-slate-400">${e.datum}</p>
                    </div>
                    <p class="font-black">${parseFloat(e.betrag).toFixed(2)} €</p>
                </div>`;
            });
            list.innerHTML = html;
            document.getElementById('totalAmount').innerText = total.toLocaleString('de-DE', {style:'currency', currency:'EUR'});
        }

        document.getElementById('addExpenseBtn').onclick = () => {
            document.getElementById('datum').value = new Date().toISOString().split('T')[0];
            document.getElementById('addModal').classList.remove('hidden');
        };

        document.getElementById('expenseForm').onsubmit = async (ev) => {
            ev.preventDefault();
            if(!currentUser) return;

            const data = {
                betrag: parseFloat(document.getElementById('betrag').value),
                beschreibung: document.getElementById('beschreibung').value,
                datum: document.getElementById('datum').value,
                ts: Date.now()
            };

            try {
                await db.collection('artifacts').doc('budget-app').collection('users').doc(currentUser.uid).collection('ausgaben').add(data);
                closeModal('addModal');
                document.getElementById('expenseForm').reset();
            } catch(e) {
                alert("Fehler beim Speichern: " + e.message);
            }
        };

        window.closeModal = id => document.getElementById(id).classList.add('hidden');
        function hideSplash() {
            document.getElementById('splashScreen').style.opacity = '0';
            setTimeout(() => document.getElementById('splashScreen').style.display = 'none', 500);
        }
    </script>
</body>
</html>
