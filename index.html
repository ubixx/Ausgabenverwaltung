<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Budget Cloud Komplett</title>
    
    <!-- PWA & Mobile Meta Tags -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#6366f1">
    
    <link rel="manifest" href="manifest.json">
    
    <!-- Tailwind CSS & FontAwesome -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

    <style>
        :root { --app-primary: #6366f1; --app-bg: #f8fafc; }
        body { 
            background-color: var(--app-bg); 
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            padding-top: env(safe-area-inset-top);
        }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        #splashScreen { transition: opacity 0.5s ease-out; }
        .category-pill.selected { background-color: var(--app-primary) !important; color: white !important; border-color: var(--app-primary) !important; }
        .action-card { transition: transform 0.1s active; cursor: pointer; }
        .action-card:active { transform: scale(0.98); }
        .scroll-container { -webkit-overflow-scrolling: touch; }
    </style>
</head>
<body class="min-h-screen font-sans text-slate-800">

    <!-- SPLASH SCREEN -->
    <div id="splashScreen" class="fixed inset-0 bg-white z-[1000] flex flex-col items-center justify-center p-8 text-center">
        <div class="w-20 h-20 bg-indigo-600 text-white rounded-3xl flex items-center justify-center text-4xl mb-4 shadow-2xl">
            <i class="fas fa-wallet"></i>
        </div>
        <p id="statusText" class="text-slate-400 font-bold text-xs uppercase tracking-widest">Verbinde mit Cloud...</p>
    </div>

    <!-- AUTH SCREEN -->
    <div id="authScreen" class="hidden min-h-screen flex flex-col items-center justify-center p-6 bg-slate-50 z-50">
        <div class="bg-white w-full max-w-md rounded-[2.5rem] p-8 shadow-2xl text-center">
            <div class="w-16 h-16 bg-indigo-600 text-white rounded-2xl flex items-center justify-center text-3xl mx-auto mb-6 shadow-lg">
                <i class="fas fa-lock"></i>
            </div>
            <h2 class="text-2xl font-black text-slate-900 mb-2">Anmelden</h2>
            <p class="text-sm text-slate-500 mb-8">Geräteübergreifend synchronisieren</p>
            
            <form id="authForm" class="space-y-4" onsubmit="event.preventDefault()">
                <input type="email" id="authEmail" placeholder="E-Mail Adresse" required class="w-full p-4 bg-slate-50 rounded-2xl font-bold outline-none border-2 border-transparent focus:border-indigo-500">
                <input type="password" id="authPassword" placeholder="Passwort (min. 6 Zeichen)" required class="w-full p-4 bg-slate-50 rounded-2xl font-bold outline-none border-2 border-transparent focus:border-indigo-500">
                
                <div class="flex gap-3 pt-4">
                    <button type="button" onclick="handleLogin()" class="flex-1 bg-indigo-600 text-white font-bold py-4 rounded-2xl shadow-lg active:scale-95 transition-transform">Login</button>
                    <button type="button" onclick="handleRegister()" class="flex-1 bg-slate-900 text-white font-bold py-4 rounded-2xl shadow-lg active:scale-95 transition-transform">Registrieren</button>
                </div>
                <p id="authError" class="text-rose-500 text-sm font-bold mt-4 hidden"></p>
            </form>
        </div>
    </div>

    <!-- MAIN APP UI -->
    <div id="mainApp" class="hidden flex flex-col min-h-screen">
        <header class="p-6 bg-white border-b border-slate-100 flex justify-between items-center sticky top-0 z-30">
            <div>
                <h2 class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1 flex items-center gap-2">
                    Gesamtsaldo <span id="cloudStatus" class="w-2 h-2 rounded-full bg-slate-300"></span>
                </h2>
                <div id="totalAmount" class="text-3xl font-black text-slate-900 tracking-tight">0,00 €</div>
            </div>
            <button onclick="document.getElementById('dataModal').classList.remove('hidden')" class="w-12 h-12 bg-slate-50 text-slate-500 rounded-2xl flex items-center justify-center border border-slate-100 shadow-sm">
                <i class="fas fa-cog"></i>
            </button>
        </header>

        <div class="bg-white/95 backdrop-blur-md border-b border-slate-100 sticky top-[93px] z-20">
            <div class="px-6 py-4">
                <div class="relative">
                    <input type="text" id="searchInput" placeholder="Suchen..." onkeyup="renderUI()" class="w-full p-4 pl-12 bg-slate-100/50 border border-transparent rounded-2xl text-sm outline-none focus:bg-white focus:border-indigo-100 transition-all">
                    <i class="fas fa-search absolute left-5 top-1/2 -translate-y-1/2 text-slate-400"></i>
                </div>
            </div>
            <div id="filterBar" class="px-6 pb-4 flex gap-2 overflow-x-auto no-scrollbar scroll-container"></div>
        </div>

        <div class="flex-1 p-6 space-y-4 pb-40 overflow-y-auto scroll-container" id="expenseList"></div>

        <div class="fixed bottom-0 left-0 right-0 p-8 flex justify-center pointer-events-none z-40 mb-[env(safe-area-inset-bottom)]">
            <button id="addExpenseBtn" class="w-full max-w-md bg-indigo-600 text-white font-bold py-5 rounded-2xl flex items-center justify-center gap-3 pointer-events-auto text-lg shadow-xl active:bg-indigo-800 transition-all">
                <i class="fas fa-plus"></i> Neuer Eintrag
            </button>
        </div>
    </div>

    <!-- SETTINGS MODAL -->
    <div id="dataModal" class="hidden fixed inset-0 bg-slate-900/60 z-[700] flex items-center justify-center p-6">
        <div class="bg-white w-full max-w-md rounded-[2.5rem] p-8 shadow-2xl flex flex-col max-h-[90vh]">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-xl font-black text-slate-900">Einstellungen</h3>
                <button onclick="closeModal('dataModal')" class="text-slate-400 p-2"><i class="fas fa-times"></i></button>
            </div>
            <div class="flex-1 overflow-y-auto no-scrollbar space-y-6">
                <div class="space-y-4">
                    <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest block">Daten-Management</label>
                    <div class="grid grid-cols-1 gap-3">
                        <label class="bg-indigo-50 text-indigo-600 font-bold py-4 rounded-2xl text-sm flex items-center justify-center gap-3 cursor-pointer border border-indigo-100 active:bg-indigo-200 transition-colors">
                            <i class="fas fa-file-import text-lg"></i> CSV Import
                            <input type="file" accept=".csv" class="hidden" onchange="handleImport(this)">
                        </label>
                        <button onclick="handleManualExport()" class="bg-slate-900 text-white font-bold py-4 rounded-2xl text-sm flex items-center justify-center gap-3 shadow-lg active:bg-slate-800 transition-all">
                            <i class="fas fa-file-export text-lg"></i> Als CSV Exportieren
                        </button>
                    </div>
                </div>
                <div class="pt-4 border-t border-slate-100">
                    <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest block mb-2">Kategorien Verwalten</label>
                    <div id="manageCategoryList" class="space-y-2 mb-4"></div>
                    <div class="flex gap-2">
                        <input type="text" id="newCatInput" placeholder="Neue Kategorie..." class="flex-1 p-3 bg-slate-50 border border-slate-200 rounded-xl text-sm outline-none focus:border-indigo-300">
                        <button onclick="addNewCategory()" class="bg-indigo-600 text-white px-5 rounded-xl"><i class="fas fa-plus"></i></button>
                    </div>
                </div>
                <div class="pt-4 border-t border-slate-100">
                    <button onclick="handleLogout()" class="w-full bg-rose-50 text-rose-600 font-bold py-4 rounded-2xl text-sm flex items-center justify-center gap-3 active:bg-rose-100 transition-colors">
                        <i class="fas fa-sign-out-alt text-lg"></i> Abmelden
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- ADD/EDIT MODAL -->
    <div id="addModal" class="hidden fixed inset-0 bg-slate-900/60 z-[600] flex items-end sm:items-center justify-center">
        <div class="bg-white w-full max-w-lg rounded-t-[2.5rem] sm:rounded-[2.5rem] p-8 shadow-2xl overflow-y-auto max-h-[95vh] mb-[env(safe-area-inset-bottom)]">
             <div class="flex justify-between items-center mb-6">
                <h3 id="modalTitle" class="text-xl font-black text-slate-900">Eintrag</h3>
                <button onclick="closeModal('addModal')" class="w-10 h-10 bg-slate-50 text-slate-400 rounded-full flex items-center justify-center"><i class="fas fa-times"></i></button>
            </div>
            <form id="expenseForm" class="space-y-4">
                <input type="hidden" id="editId">
                <div class="grid grid-cols-2 gap-4">
                    <input type="number" id="betrag" placeholder="0,00" step="0.01" required class="w-full p-4 bg-slate-50 rounded-2xl text-xl font-bold outline-none border-2 border-transparent focus:border-indigo-500">
                    <input type="date" id="datum" required class="w-full p-4 bg-slate-50 rounded-2xl font-bold outline-none border-2 border-transparent focus:border-indigo-500">
                </div>
                <input type="text" id="beschreibung" placeholder="Wofür?" required class="w-full p-4 bg-slate-50 rounded-2xl font-bold outline-none border-2 border-transparent focus:border-indigo-500">
                
                <!-- Beleg Feld mit verbesserter Link-Vorschau -->
                <div class="relative">
                    <input type="text" id="beleg" oninput="updateBelegLinkPreview(this.value)" placeholder="Beleg (URL oder Notiz)" class="w-full p-4 bg-slate-50 rounded-2xl font-bold outline-none border-2 border-transparent focus:border-indigo-500 text-sm">
                    <div id="belegPreview" class="absolute right-4 top-1/2 -translate-y-1/2 hidden">
                        <a href="#" id="belegLink" target="_blank" class="w-10 h-10 bg-indigo-100 text-indigo-600 rounded-xl flex items-center justify-center transition-transform active:scale-90">
                            <i class="fas fa-external-link-alt"></i>
                        </a>
                    </div>
                </div>

                <div id="categoryGrid" class="flex flex-wrap gap-2"></div>
                <div class="flex gap-4 pt-4">
                    <button type="submit" class="flex-1 bg-indigo-600 text-white font-bold py-5 rounded-2xl shadow-lg active:scale-95 transition-transform">Speichern</button>
                    <button type="button" id="deleteBtn" class="hidden bg-rose-50 text-rose-500 font-bold px-6 rounded-2xl active:bg-rose-100"><i class="fas fa-trash-alt"></i></button>
                </div>
            </form>
        </div>
    </div>

    <script>
        var expenses = [];
        var categories = [];
        var activeFilter = 'all';
        var selectedCategory = '';
        var db = null;
        var currentUser = null;

        const firebaseConfig = {
            apiKey: "AIzaSyD1zzt4pZzyNxMDWpc5MG2aPRecHKQG7IE",
            authDomain: "meinbudgetcloud.firebaseapp.com",
            projectId: "meinbudgetcloud",
            storageBucket: "meinbudgetcloud.firebasestorage.app",
            messagingSenderId: "594713378906",
            appId: "1:594713378906:web:7929f7a875159336101863"
        };

        window.onload = function() {
            try {
                if (!firebase.apps.length) {
                    firebase.initializeApp(firebaseConfig);
                }
                db = firebase.firestore();
                firebase.auth().onAuthStateChanged(user => {
                    if (user) { 
                        currentUser = user; 
                        document.getElementById('cloudStatus').classList.replace('bg-slate-300', 'bg-emerald-500');
                        document.getElementById('authScreen').classList.add('hidden');
                        document.getElementById('mainApp').classList.remove('hidden');
                        startSync(); 
                    } else { 
                        currentUser = null;
                        hideSplash();
                        document.getElementById('mainApp').classList.add('hidden');
                        document.getElementById('authScreen').classList.remove('hidden');
                    }
                });
            } catch(e) {
                document.getElementById('statusText').innerText = "Verbindung fehlgeschlagen.";
            }
        };

        async function handleLogin() {
            const email = document.getElementById('authEmail').value;
            const pass = document.getElementById('authPassword').value;
            if(!email || !pass) return showAuthError("Bitte Daten eingeben.");
            try { await firebase.auth().signInWithEmailAndPassword(email, pass); } catch(e) { showAuthError(e.message); }
        }

        async function handleRegister() {
            const email = document.getElementById('authEmail').value;
            const pass = document.getElementById('authPassword').value;
            if(!email || !pass) return showAuthError("Bitte Daten eingeben.");
            try { await firebase.auth().createUserWithEmailAndPassword(email, pass); } catch(e) { showAuthError(e.message); }
        }

        function handleLogout() {
            firebase.auth().signOut().then(() => {
                closeModal('dataModal');
                expenses = [];
                categories = [];
                renderUI();
            });
        }

        function startSync() {
            const userRef = db.collection('users').doc(currentUser.uid);
            userRef.collection('categories').onSnapshot(snap => {
                categories = snap.docs.map(d => ({...d.data(), id: d.id}));
                if (categories.length === 0) setupDefaultsCloud();
                else { renderFilters(); renderManagementUI(); }
            });
            userRef.collection('ausgaben').onSnapshot(snap => {
                expenses = snap.docs.map(d => ({...d.data(), id: d.id}));
                expenses.sort((a,b) => new Date(b.datum) - new Date(a.datum));
                renderUI();
                hideSplash();
            });
        }

        function setupDefaultsCloud() {
            ['Essen', 'Wohnen', 'Gehalt', 'Freizeit'].forEach(n => { 
                db.collection('users').doc(currentUser.uid).collection('categories').add({name: n}); 
            });
        }

        function renderUI() {
            const list = document.getElementById('expenseList');
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            let filtered = expenses.filter(e => {
                const matchFilter = activeFilter === 'all' || e.kategorieId === activeFilter;
                const matchSearch = e.beschreibung.toLowerCase().includes(searchTerm);
                return matchFilter && matchSearch;
            });

            let total = 0;
            let html = "";
            filtered.forEach(e => {
                const cat = categories.find(c => c.id === e.kategorieId);
                const isInc = cat?.name === 'Gehalt' || cat?.name === 'Einnahmen';
                total += isInc ? parseFloat(e.betrag) : -parseFloat(e.betrag);
                
                // Büroklammer Icon mit StopPropagation, damit Link klickbar ist ohne das Modal zu triggern
                let belegIcon = e.beleg && e.beleg.startsWith('http') ? 
                    `<a href="${e.beleg}" target="_blank" onclick="event.stopPropagation()" class="ml-2 text-indigo-400 hover:text-indigo-600 p-1"><i class="fas fa-paperclip"></i></a>` : 
                    (e.beleg ? `<i class="fas fa-sticky-note text-slate-300 ml-2" title="${e.beleg}"></i>` : '');

                html += `
                <div class="bg-white p-5 rounded-[2rem] border border-slate-50 shadow-sm flex items-center justify-between action-card" onclick="editExpense('${e.id}')">
                    <div class="flex items-center gap-4 flex-1 min-w-0">
                        <div class="w-12 h-12 rounded-2xl ${isInc ? 'bg-emerald-50 text-emerald-500' : 'bg-indigo-50 text-indigo-500'} flex items-center justify-center shrink-0"><i class="fas ${isInc ? 'fa-arrow-up' : 'fa-arrow-down'}"></i></div>
                        <div class="min-w-0 pr-2">
                            <p class="font-bold text-slate-900 truncate uppercase text-[13px] tracking-tight flex items-center">
                                <span class="truncate">${e.beschreibung}</span> ${belegIcon}
                            </p>
                            <p class="text-[10px] text-slate-400 font-bold uppercase">${new Date(e.datum).toLocaleDateString('de-DE')} • ${cat?.name || 'Diverse'}</p>
                        </div>
                    </div>
                    <p class="font-black ${isInc ? 'text-emerald-500' : 'text-slate-900'}">${isInc ? '+' : '-'}${parseFloat(e.betrag).toFixed(2)} €</p>
                </div>`;
            });
            list.innerHTML = html || '<div class="text-center py-20 text-slate-300 font-bold">Keine Einträge</div>';
            document.getElementById('totalAmount').innerText = total.toLocaleString('de-DE', {style:'currency', currency:'EUR'});
        }

        function renderFilters() {
            var html = `<button onclick="setFilter('all')" class="px-5 py-2.5 rounded-xl text-[10px] font-bold uppercase ${activeFilter==='all'?'bg-indigo-600 text-white':'bg-white text-slate-400 border'}">Alle</button>`;
            categories.forEach(c => {
                html += `<button onclick="setFilter('${c.id}')" class="px-5 py-2.5 rounded-xl text-[10px] font-bold uppercase whitespace-nowrap ${activeFilter===c.id?'bg-indigo-600 text-white':'bg-white text-slate-400 border'}">${c.name}</button>`;
            });
            document.getElementById('filterBar').innerHTML = html;
        }

        window.setFilter = id => { activeFilter = id; renderFilters(); renderUI(); };
        window.closeModal = id => document.getElementById(id).classList.add('hidden');
        
        document.getElementById('addExpenseBtn').onclick = () => {
            document.getElementById('expenseForm').reset();
            document.getElementById('editId').value = '';
            document.getElementById('datum').value = new Date().toISOString().split('T')[0];
            updateBelegLinkPreview('');
            selectedCategory = categories[0]?.id;
            document.getElementById('deleteBtn').classList.add('hidden');
            document.getElementById('modalTitle').innerText = 'Neuer Eintrag';
            document.getElementById('addModal').classList.remove('hidden');
            renderCategoryGrid();
        };

        window.editExpense = id => {
            const e = expenses.find(x => x.id === id); if (!e) return;
            document.getElementById('editId').value = e.id;
            document.getElementById('betrag').value = e.betrag;
            document.getElementById('beschreibung').value = e.beschreibung;
            document.getElementById('datum').value = e.datum;
            document.getElementById('beleg').value = e.beleg || '';
            updateBelegLinkPreview(e.beleg || '');
            selectedCategory = e.kategorieId;
            document.getElementById('deleteBtn').classList.remove('hidden');
            document.getElementById('modalTitle').innerText = 'Eintrag bearbeiten';
            document.getElementById('addModal').classList.remove('hidden');
            renderCategoryGrid();
        };

        window.updateBelegLinkPreview = val => {
            const preview = document.getElementById('belegPreview');
            const link = document.getElementById('belegLink');
            if(val && (val.startsWith('http://') || val.startsWith('https://'))) {
                preview.classList.remove('hidden');
                link.href = val;
            } else {
                preview.classList.add('hidden');
            }
        };

        document.getElementById('expenseForm').onsubmit = ev => {
            ev.preventDefault();
            const id = document.getElementById('editId').value;
            const data = {
                betrag: parseFloat(document.getElementById('betrag').value),
                beschreibung: document.getElementById('beschreibung').value.trim(),
                datum: document.getElementById('datum').value,
                beleg: document.getElementById('beleg').value.trim(),
                kategorieId: selectedCategory,
                ts: Date.now()
            };
            const col = db.collection('users').doc(currentUser.uid).collection('ausgaben');
            if(id) col.doc(id).update(data).then(() => closeModal('addModal'));
            else col.add(data).then(() => closeModal('addModal'));
        };

        document.getElementById('deleteBtn').onclick = () => {
            if(confirm("Löschen?")) {
                db.collection('users').doc(currentUser.uid).collection('ausgaben').doc(document.getElementById('editId').value).delete().then(() => closeModal('addModal'));
            }
        };

        function renderCategoryGrid() {
            document.getElementById('categoryGrid').innerHTML = categories.map(c => `
                <button type="button" onclick="selectedCategory='${c.id}';renderCategoryGrid()" class="category-pill px-4 py-3 rounded-xl border-2 text-[10px] font-bold uppercase ${selectedCategory===c.id?'selected':'bg-slate-50 text-slate-500'}">${c.name}</button>
            `).join('');
        }

        function renderManagementUI() {
            document.getElementById('manageCategoryList').innerHTML = categories.map(c => `
                <div class="flex items-center gap-2 bg-slate-50 p-2 pl-4 rounded-xl border text-sm font-bold">
                    <input type="text" value="${c.name}" onblur="updateCatName('${c.id}', this.value)" class="flex-1 bg-transparent outline-none">
                    <button onclick="requestDeleteCategory('${c.id}')" class="w-8 h-8 text-rose-400"><i class="fas fa-times"></i></button>
                </div>`).join('');
        }

        window.addNewCategory = () => {
            const n = document.getElementById('newCatInput').value.trim(); if (n) db.collection('users').doc(currentUser.uid).collection('categories').add({name:n});
            document.getElementById('newCatInput').value = "";
        };

        window.updateCatName = (id, val) => { if(val.trim()) db.collection('users').doc(currentUser.uid).collection('categories').doc(id).update({name:val.trim()}); };
        window.requestDeleteCategory = id => { if(categories.length > 1 && confirm("Löschen?")) db.collection('users').doc(currentUser.uid).collection('categories').doc(id).delete(); };

        async function handleImport(input) {
            const file = input.files[0]; if (!file) return;
            const reader = new FileReader();
            reader.onload = async (e) => {
                const lines = e.target.result.split('\n').filter(l => l.trim());
                const batch = db.batch();
                const col = db.collection('users').doc(currentUser.uid).collection('ausgaben');
                for (let i = 1; i < lines.length; i++) {
                    const v = lines[i].split(/[;,]/);
                    batch.set(col.doc(), { datum: v[0]||'', beschreibung: v[1]||'', betrag: parseFloat(v[2])||0, beleg: v[3]||'', kategorieId: categories[0].id, ts: Date.now()+i });
                }
                await batch.commit(); closeModal('dataModal');
            };
            reader.readAsText(file);
        }

        async function handleManualExport() {
            const rows = expenses.map(e => `${e.datum};${e.beschreibung};${e.betrag};${e.beleg||''}`);
            const blob = new Blob(["\uFEFF" + "Datum;Beschreibung;Betrag;Beleg\n" + rows.join("\n")], { type: 'text/csv' });
            const link = document.createElement("a"); link.href = URL.createObjectURL(blob); link.download = `budget.csv`; link.click();
        }

        function hideSplash() { document.getElementById('splashScreen').style.opacity = '0'; setTimeout(() => document.getElementById('splashScreen').style.display = 'none', 500); }
        function showAuthError(m) { const e = document.getElementById('authError'); e.innerText = m; e.classList.remove('hidden'); }
    </script>
</body>
</html>
